llm:
  base_url_env: OPENAI_BASE_URL
  base_url_default: https://api.vectorengine.ai/v1
  api_key_env: OPENAI_API_KEY
  model_env: OPENAI_MODEL
  model_default: deepseek-v3
  timeout: 60

task:
  timeout_seconds: 120
  datasets:
    - datasets/tsp/dataset_tsp_train_fixed30_uniform_32.pkl
    - datasets/tsp/dataset_tsp_train_fixed30_cluster_32.pkl
    - datasets/tsp/dataset_tsp_train_fixed30_bezier_32.pkl
    - datasets/tsp/dataset_tsp_train_fixed30_grid_holes_32.pkl
  return_list: true

hidden_test:
  datasets:
    - datasets/tsp/dataset_tsp_hidden_id_size20.pkl
    - datasets/tsp/dataset_tsp_hidden_id_size50.pkl
    - datasets/tsp/dataset_tsp_hidden_id_size100.pkl
    - datasets/tsp/dataset_tsp_hidden_ood_size20.pkl
    - datasets/tsp/dataset_tsp_hidden_ood_size50.pkl
    - datasets/tsp/dataset_tsp_hidden_ood_size100.pkl
  seed: 12026
  city_sizes: [20, 50, 100]
  instances_per_size: 128
  function_timeout_seconds: 60
  speed_probe_timeout_seconds: 0

profiler:
  log_dir: logs/eohs
  log_style: simple

method:
  max_sample_nums: 500
  max_generations: 1000
  pop_size: 10
  num_samplers: 4
  num_evaluators: 4
  debug_mode: false
